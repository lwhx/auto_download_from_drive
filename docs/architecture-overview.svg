<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1160" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="260" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="daemon" x1="0" y1="0" x2="260" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="shared" x1="0" y1="0" x2="400" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="proxy" x1="0" y1="0" x2="220" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B45309"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="storage" x1="0" y1="0" x2="280" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#374151"/>
      <stop offset="1" stop-color="#4B5563"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1320" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1L11 7L1 13" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94A3B8; }
      .box-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F8FAFC; }
      .box-text { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #DBEAFE; }
      .shared-text { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F3E8FF; }
      .chip-text { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E2E8F0; letter-spacing: 0.08em; }
      .legend-text { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #CBD5E1; }
      .muted { fill: #BFDBFE; }
      .storage-text { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #E5E7EB; }
    </style>
  </defs>

  <rect width="1280" height="760" rx="28" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="64" y="44" width="1152" height="672" rx="28" fill="#0B1220" stroke="#1E293B" stroke-width="1.5"/>
  </g>

  <text x="104" y="104" class="title">Architecture Overview</text>
  <text x="104" y="132" class="subtitle">One-way incremental downloads from rclone-mounted sources into local storage, with shared-file coordination between the daemon and web panel.</text>

  <rect x="104" y="164" width="172" height="34" rx="17" fill="#111827" stroke="#334155"/>
  <text x="123" y="186" class="chip-text">README DIAGRAM</text>

  <rect x="104" y="244" width="220" height="108" rx="22" fill="url(#proxy)" stroke="#FCD34D" stroke-opacity="0.55"/>
  <text x="136" y="286" class="box-title">Reverse Proxy</text>
  <text x="136" y="314" class="box-text">Caddy / Nginx</text>
  <text x="136" y="336" class="box-text">Publishes 127.0.0.1:5000</text>

  <rect x="104" y="420" width="250" height="146" rx="24" fill="url(#panel)" stroke="#93C5FD" stroke-opacity="0.5"/>
  <text x="136" y="464" class="box-title">web-panel.service</text>
  <text x="136" y="494" class="box-text">Flask + Socket.IO + Gunicorn</text>
  <text x="136" y="518" class="box-text">Auth, config editing, logs</text>
  <text x="136" y="542" class="box-text">Live transfer progress</text>

  <rect x="442" y="260" width="396" height="288" rx="28" fill="url(#shared)" stroke="#E9D5FF" stroke-opacity="0.55"/>
  <text x="476" y="308" class="box-title">/opt/sync Shared State</text>
  <text x="476" y="344" class="shared-text">config.json</text>
  <text x="476" y="374" class="shared-text">sync_state.json</text>
  <text x="476" y="404" class="shared-text">active_transfers.json</text>
  <text x="476" y="434" class="shared-text">runtime_status.json</text>
  <text x="476" y="464" class="shared-text">sync.log</text>
  <text x="476" y="512" class="shared-text">Shared-file contract between UI and daemon</text>

  <rect x="926" y="420" width="250" height="146" rx="24" fill="url(#daemon)" stroke="#99F6E4" stroke-opacity="0.55"/>
  <text x="960" y="464" class="box-title">sync.service</text>
  <text x="960" y="494" class="box-text">Python daemon</text>
  <text x="960" y="518" class="box-text">Scan, queue, download, refresh</text>
  <text x="960" y="542" class="box-text">Retries + persistence</text>

  <rect x="902" y="206" width="274" height="124" rx="24" fill="url(#storage)" stroke="#94A3B8" stroke-opacity="0.4"/>
  <text x="936" y="248" class="box-title">rclone-mounted source</text>
  <text x="936" y="278" class="storage-text">Baseline snapshot</text>
  <text x="936" y="302" class="storage-text">Only new files are queued</text>

  <rect x="902" y="602" width="274" height="90" rx="24" fill="url(#storage)" stroke="#94A3B8" stroke-opacity="0.4"/>
  <text x="936" y="643" class="box-title">Local destination</text>
  <text x="936" y="668" class="storage-text">Downloaded files only</text>

  <path d="M214 352V404" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M354 492H426" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M854 492H898" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1040 332V402" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1040 568V588" stroke="#CBD5E1" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="172" y="598" width="402" height="80" rx="18" fill="#0F172A" stroke="#334155"/>
  <circle cx="204" cy="638" r="7" fill="#60A5FA"/>
  <text x="224" y="643" class="legend-text">Panel reads state files and writes config changes.</text>
  <circle cx="204" cy="668" r="7" fill="#2DD4BF"/>
  <text x="224" y="673" class="legend-text">Daemon owns scanning, retries, downloads, and mount refresh.</text>
</svg>
