<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Daemon 管理面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind = {
            darkMode: 'class',
            config: {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                50: '#eff8ff',
                                100: '#dceefe',
                                500: '#2d8cff',
                                600: '#1f79e0',
                                700: '#1a65bd'
                            }
                        },
                        boxShadow: {
                            soft: '0 20px 60px -24px rgba(15, 23, 42, 0.35)'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 系统主题检测和应用
        function applyTheme() {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    </script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background: radial-gradient(circle at 20% -10%, #d9eeff 0%, transparent 45%),
                radial-gradient(circle at 90% 0%, #e9f8f2 0%, transparent 40%),
                #f4f8fb;
        }

        .dark body {
            background: radial-gradient(circle at 20% -10%, #1e3a52 0%, transparent 45%),
                radial-gradient(circle at 90% 0%, #1a3d2e 0%, transparent 40%),
                #0f172a;
        }

        .panel-card {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            box-shadow: 0 20px 60px -24px rgba(15, 23, 42, 0.35);
        }

        .dark .panel-card {
            border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 20px 60px -24px rgba(0, 0, 0, 0.6);
        }

        .tab-btn {
            border-bottom: 2px solid transparent;
            color: #64748b;
            transition: all 180ms ease;
        }

        .tab-btn:hover {
            color: #0f172a;
            background: #eef4fa;
        }

        .dark .tab-btn {
            color: #94a3b8;
        }

        .dark .tab-btn:hover {
            color: #f1f5f9;
            background: #334155;
        }

        .tab-btn.border-blue-500 {
            color: #0f172a;
            border-bottom-color: #2d8cff;
            background: #e9f3ff;
        }

        .dark .tab-btn.border-blue-500 {
            color: #f1f5f9;
            border-bottom-color: #3b82f6;
            background: #1e3a52;
        }
    </style>
</head>

<body class="min-h-screen text-slate-800 dark:bg-slate-950 dark:text-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 lg:py-10">
        <section class="panel-card mb-6 overflow-hidden p-6 sm:p-8">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Sync Daemon</p>
                    <h1 class="mt-2 text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-50 sm:text-4xl">管理面板</h1>
                    <p class="mt-3 max-w-2xl text-sm text-slate-600 dark:text-slate-300 sm:text-base">配置同步策略，实时查看传输状态，统一管理运行日志。</p>
                </div>
                <div class="rounded-2xl border border-sky-100 dark:border-sky-900 bg-sky-50/70 dark:bg-sky-950/50 px-4 py-3 text-sm text-sky-700 dark:text-sky-300">
                    前端已启用实时状态刷新
                </div>
            </div>
        </section>

        <section class="panel-card p-3 sm:p-4">
            <div class="mb-6 border-b border-slate-200 dark:border-slate-700 px-1">
                <nav class="flex flex-wrap gap-2 pb-2">
                    <button onclick="showTab('config')" id="tab-config"
                        class="tab-btn border-blue-500 rounded-lg px-4 py-2 text-sm font-semibold">配置管理</button>
                    <button onclick="showTab('status')" id="tab-status"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">状态监控</button>
                    <button onclick="showTab('progress')" id="tab-progress"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">实时进度</button>
                    <button onclick="showTab('logs')" id="tab-logs"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">日志查看</button>
                </nav>
            </div>

            <div id="content-config" class="tab-content px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">配置管理</h2>
                    <div id="config-form"></div>
                    <div class="mt-6 flex flex-col items-start gap-3">
                        <button id="config-save-btn" onclick="saveConfig()"
                            class="rounded-lg bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition">
                            保存配置
                        </button>
                        <div id="config-message"></div>
                    </div>
                </div>
            </div>

            <div id="content-status" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">状态监控</h2>
                    <div id="stats-cards" class="mb-6 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
                    <div id="files-table"></div>
                </div>
            </div>

            <div id="content-progress" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">实时进度</h2>
                    <div id="progress-list"></div>
                </div>
            </div>

            <div id="content-logs" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                        <h2 class="text-xl font-bold text-slate-900 dark:text-slate-50">日志查看</h2>
                        <button onclick="loadLogs()"
                            class="rounded-lg bg-emerald-500 dark:bg-emerald-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-600 dark:hover:bg-emerald-500">刷新日志</button>
                    </div>
                    <div id="logs-content"
                        class="h-96 overflow-y-auto whitespace-pre-wrap break-words rounded-xl border border-slate-800 dark:border-slate-700 bg-slate-900 dark:bg-slate-950 p-4 font-mono text-sm leading-6 text-emerald-300 dark:text-emerald-400"></div>
                </div>
            </div>
        </section>
    </div>
    <script>
        const socket = io({ autoConnect: false });
        let currentConfig = {};
        let progressPollTimer = null;

        let authPromise = null;
        let csrfToken = '';
        const UNSAFE_HTTP_METHODS = new Set(['POST', 'PUT', 'PATCH', 'DELETE']);

        function isUnsafeMethod(method) {
            return UNSAFE_HTTP_METHODS.has(String(method || 'GET').toUpperCase());
        }

        function updateCsrfToken(payload) {
            if (payload && typeof payload.csrf_token === 'string' && payload.csrf_token) {
                csrfToken = payload.csrf_token;
            }
        }

        async function ensureAuth() {
            if (authPromise) {
                return authPromise;
            }

            authPromise = (async () => {
                try {
                    const checkResp = await fetch('/api/auth', { method: 'POST' });
                    if (checkResp.ok) {
                        updateCsrfToken(await checkResp.json());
                        if (!socket.connected) {
                            socket.auth = { csrf_token: csrfToken };
                            socket.connect();
                        }
                        return true;
                    }
                } catch (err) {
                    console.error('认证检查失败', err);
                }

                const input = prompt("需要 API Key 认证，请输入 (不会写入 localStorage):", "");
                if (input === null) {
                    return false;
                }

                const apiKey = input.trim();
                if (!apiKey) {
                    return false;
                }

                try {
                    const authResp = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'X-API-Key': apiKey }
                    });
                    if (!authResp.ok) {
                        return false;
                    }
                    updateCsrfToken(await authResp.json());
                    if (!socket.connected) {
                        socket.connect();
                    }
                    return true;
                } catch (err) {
                    console.error('认证失败', err);
                    return false;
                }
            })();

            try {
                return await authPromise;
            } finally {
                authPromise = null;
            }
        }

        async function apiFetch(url, options = {}) {
            const requestOptions = {
                ...options,
                method: String(options.method || 'GET').toUpperCase(),
                headers: { ...(options.headers || {}) }
            };
            const unsafeMethod = isUnsafeMethod(requestOptions.method);

            if (unsafeMethod && !csrfToken) {
                await ensureAuth();
            }
            if (unsafeMethod && csrfToken) {
                requestOptions.headers['X-CSRF-Token'] = csrfToken;
            }

            let resp = await fetch(url, requestOptions);
            if (resp.status === 401 || (unsafeMethod && resp.status === 403)) {
                const authed = await ensureAuth();
                if (authed) {
                    if (unsafeMethod && csrfToken) {
                        requestOptions.headers['X-CSRF-Token'] = csrfToken;
                    }
                    resp = await fetch(url, requestOptions);
                }
            }
            return resp;
        }

        function createElement(tagName, options = {}) {
            const {
                className = '',
                text = null,
                id = '',
                type = '',
                attrs = {},
                children = []
            } = options;

            const element = document.createElement(tagName);
            if (className) {
                element.className = className;
            }
            if (text !== null) {
                element.textContent = text;
            }
            if (id) {
                element.id = id;
            }
            if (type) {
                element.type = type;
            }
            Object.entries(attrs).forEach(([key, value]) => {
                if (value !== undefined && value !== null) {
                    element.setAttribute(key, value);
                }
            });
            children.forEach((child) => {
                if (child) {
                    element.appendChild(child);
                }
            });
            return element;
        }

        function setConfigMessage(kind, message) {
            const container = document.getElementById('config-message');
            container.replaceChildren();
            if (!message) {
                return;
            }

            const className = kind === 'success'
                ? 'rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700'
                : 'rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700';
            container.appendChild(createElement('div', { className, text: message }));
        }

        function createLabeledInput({
            labelText,
            id,
            type = 'text',
            value = '',
            placeholder = '',
            hintText = '',
            readOnly = false
        }) {
            const wrapper = createElement('div');
            const label = createElement('label', {
                className: 'mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300',
                text: labelText
            });
            if (id) {
                label.htmlFor = id;
            }

            if (hintText) {
                label.appendChild(document.createTextNode(' '));
                label.appendChild(createElement('span', {
                    className: 'text-xs font-medium text-slate-500 dark:text-slate-400',
                    text: hintText
                }));
            }

            const input = createElement('input', {
                id,
                type,
                className: 'w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900'
            });
            input.value = value ?? '';
            if (placeholder) {
                input.placeholder = placeholder;
            }
            if (readOnly) {
                input.readOnly = true;
                input.className += ' cursor-not-allowed bg-slate-100 text-slate-500 dark:bg-slate-900 dark:text-slate-400';
            }

            wrapper.append(label, input);
            return wrapper;
        }

        function createConfigButton(label, className, onClick) {
            const button = createElement('button', {
                type: 'button',
                className,
                text: label
            });
            button.addEventListener('click', onClick);
            return button;
        }

        function createRuleField(labelText, inputId, value) {
            const wrapper = createElement('div');
            const label = createElement('label', {
                className: 'mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400',
                text: labelText
            });
            label.htmlFor = inputId;
            const input = createElement('input', {
                id: inputId,
                type: 'text',
                className: 'w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900'
            });
            input.value = value ?? '';
            wrapper.append(label, input);
            return wrapper;
        }

        function syncCurrentRulesFromForm() {
            if (!Array.isArray(currentConfig.rules)) {
                currentConfig.rules = [];
                return;
            }

            currentConfig.rules = currentConfig.rules.map((rule, i) => ({
                ...rule,
                source_path: document.getElementById(`rule_${i}_source`)?.value ?? rule.source_path ?? '',
                dest_path: document.getElementById(`rule_${i}_dest`)?.value ?? rule.dest_path ?? '',
                enabled: document.getElementById(`rule_${i}_enabled`)?.checked ?? Boolean(rule.enabled)
            }));
        }

        function createStatCard(value, label, className) {
            const card = createElement('div', { className });
            const valueNode = createElement('div', {
                className: 'text-2xl font-extrabold',
                text: String(value ?? 0)
            });
            const labelNode = createElement('div', {
                className: 'mt-1 text-sm font-medium',
                text: label
            });
            card.append(valueNode, labelNode);
            return card;
        }

        function formatSpeedMBps(value) {
            const numericValue = Number(value);
            return Number.isFinite(numericValue) ? numericValue.toString() : '0';
        }

        function formatBytesInMB(value, fallbackText) {
            const numericValue = Number(value);
            if (!Number.isFinite(numericValue)) {
                return fallbackText;
            }
            return `${(numericValue / 1024 / 1024).toFixed(1)} MB`;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('border-blue-500'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('border-blue-500');

            // 离开实时进度 tab 时停止轮询
            if (progressPollTimer !== null) {
                clearInterval(progressPollTimer);
                progressPollTimer = null;
            }

            if (tab === 'config') {
                setConfigMessage('error', '');
                loadConfig();
            }
            if (tab === 'status') loadStatus();
            if (tab === 'progress') {
                loadProgress();
                progressPollTimer = setInterval(loadProgress, 1000);
            }
            if (tab === 'logs') loadLogs();
        }

        async function loadConfig() {
            try {
                const resp = await apiFetch(`/api/config?_t=${Date.now()}`);
                currentConfig = await resp.json();
                if (currentConfig.error) {
                    setConfigMessage('error', `加载配置出错: ${currentConfig.error}`);
                }
                renderConfigForm(currentConfig);
            } catch (err) {
                setConfigMessage('error', `请求配置失败: ${err}`);
            }
        }

        function renderConfigForm(config) {
            const form = document.getElementById('config-form');
            const content = createElement('div', { className: 'space-y-4' });
            const fields = [
                { labelText: '扫描间隔（秒）', id: 'scan_interval_seconds', type: 'number', value: config.scan_interval_seconds },
                { labelText: '刷新间隔（秒）', id: 'rclone_refresh_interval_seconds', type: 'number', value: config.rclone_refresh_interval_seconds },
                { labelText: '最大并发下载数', id: 'max_concurrent_downloads', type: 'number', value: config.max_concurrent_downloads },
                { labelText: '最大重试次数', id: 'max_retry_count', type: 'number', value: config.max_retry_count },
                { labelText: '带宽限制（MB/s，0=无限制）', id: 'bandwidth_limit_mbps', type: 'number', value: config.bandwidth_limit_mbps },
                { labelText: 'rclone 命令', id: 'rclone_command', type: 'text', value: config.rclone_command },
                {
                    labelText: 'rclone 服务名',
                    id: 'rclone_service_name',
                    type: 'text',
                    value: config.rclone_service_name,
                    placeholder: '例如：rclone-pikpak',
                    hintText: '（必须以 rclone- 开头）'
                },
                {
                    labelText: '同步脚本 service 名',
                    id: 'sync_service_name',
                    type: 'text',
                    value: config.sync_service_name || 'sync.service',
                    hintText: '（固定值，仅在下载与队列空闲时自动 restart）',
                    readOnly: true
                }
            ];

            fields.forEach((field) => {
                content.appendChild(createLabeledInput(field));
            });

            const rulesSection = createElement('div');
            const rulesHeader = createElement('div', {
                className: 'flex items-center justify-between gap-3'
            });
            rulesHeader.append(
                createElement('label', {
                    className: 'block text-sm font-semibold text-slate-700 dark:text-slate-300',
                    text: '同步规则'
                }),
                createConfigButton(
                    '添加规则',
                    'rounded-lg bg-emerald-500 dark:bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-emerald-600 dark:hover:bg-emerald-500',
                    addRule
                )
            );
            const rulesList = createElement('div', {
                id: 'rules-list',
                className: 'mt-3 space-y-3'
            });
            rulesSection.append(rulesHeader, rulesList);
            content.appendChild(rulesSection);

            form.replaceChildren(content);
            renderRules(config.rules || []);
        }

        function renderRules(rules) {
            const list = document.getElementById('rules-list');
            list.replaceChildren();

            rules.forEach((rule, i) => {
                const card = createElement('div', {
                    className: 'rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/70 dark:bg-slate-800/70 p-3'
                });
                const grid = createElement('div', {
                    className: 'grid grid-cols-1 gap-3 sm:grid-cols-2'
                });
                grid.append(
                    createRuleField('源路径', `rule_${i}_source`, rule.source_path),
                    createRuleField('目标路径', `rule_${i}_dest`, rule.dest_path)
                );

                const footer = createElement('div', {
                    className: 'mt-3 flex items-end justify-between'
                });
                const checkboxLabel = createElement('label', {
                    className: 'inline-flex items-center text-sm font-medium text-slate-700 dark:text-slate-300'
                });
                const checkbox = createElement('input', {
                    id: `rule_${i}_enabled`,
                    type: 'checkbox',
                    className: 'mr-2 h-4 w-4 rounded border-slate-300 dark:border-slate-600 text-brand-600 focus:ring-brand-500'
                });
                checkbox.checked = Boolean(rule.enabled);
                checkboxLabel.append(checkbox, document.createTextNode('启用'));

                const deleteButton = createConfigButton(
                    '删除',
                    'rounded-lg bg-rose-500 dark:bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-rose-600 dark:hover:bg-rose-500',
                    () => deleteRule(i)
                );

                footer.append(checkboxLabel, deleteButton);
                card.append(grid, footer);
                list.appendChild(card);
            });
        }

        async function saveConfig() {
            const rcloneServiceName = document.getElementById('rclone_service_name').value.trim();
            if (!rcloneServiceName.startsWith('rclone-')) {
                setConfigMessage('error', 'rclone 服务名必须以 rclone- 开头');
                return;
            }

            // Spread original config first to preserve any extra fields (e.g. _comment)
            const newConfig = {
                ...currentConfig,
                scan_interval_seconds: parseInt(document.getElementById('scan_interval_seconds').value),
                rclone_refresh_interval_seconds: parseInt(document.getElementById('rclone_refresh_interval_seconds').value),
                max_concurrent_downloads: parseInt(document.getElementById('max_concurrent_downloads').value),
                max_retry_count: parseInt(document.getElementById('max_retry_count').value),
                bandwidth_limit_mbps: parseFloat(document.getElementById('bandwidth_limit_mbps').value),
                rclone_command: document.getElementById('rclone_command').value,
                rclone_service_name: rcloneServiceName,
                sync_service_name: 'sync.service',
                rules: (currentConfig.rules || []).map((rule, i) => ({
                    ...rule,
                    source_path: document.getElementById(`rule_${i}_source`).value,
                    dest_path: document.getElementById(`rule_${i}_dest`).value,
                    enabled: document.getElementById(`rule_${i}_enabled`).checked
                }))
            };

            const resp = await apiFetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newConfig)
            });
            const result = await resp.json();
            setConfigMessage(result.error ? 'error' : 'success', result.error || result.message);
        }

        async function addRule() {
            const sourcePathInput = prompt('请输入 source_path（源路径）:');
            if (sourcePathInput === null) return;
            const sourcePath = sourcePathInput.trim();
            if (!sourcePath) {
                setConfigMessage('error', 'source_path 不能为空');
                return;
            }

            const destPathInput = prompt('请输入 dest_path（目标路径）:');
            if (destPathInput === null) return;
            const destPath = destPathInput.trim();
            if (!destPath) {
                setConfigMessage('error', 'dest_path 不能为空');
                return;
            }

            if (!Array.isArray(currentConfig.rules)) {
                currentConfig.rules = [];
            }

            // Preserve current form edits and append the new rule at the end.
            syncCurrentRulesFromForm();

            currentConfig.rules.push({
                source_path: sourcePath,
                dest_path: destPath,
                enabled: true,
                _comment: 'Set enabled=true after validating source and destination paths.'
            });

            renderRules(currentConfig.rules);
            setConfigMessage('success', '规则已添加到列表底部，请点击“保存配置”生效。');
        }

        async function deleteRule(ruleIndex) {
            const confirmed = confirm('确认删除这条规则吗？');
            if (!confirmed) return;

            const resp = await apiFetch(`/api/config/rules/${ruleIndex}`, {
                method: 'DELETE'
            });
            const result = await resp.json();
            if (result.error) {
                setConfigMessage('error', result.error);
                return;
            }

            setConfigMessage('success', result.message);
            await loadConfig();
        }

        let currentState = null;
        let currentFolderFilter = 'all';
        let currentPage = 1;
        const PAGE_SIZE = 30;

        async function loadStatus() {
            const [statsResp, stateResp] = await Promise.all([
                apiFetch(`/api/stats?_t=${Date.now()}`),
                apiFetch(`/api/state?_t=${Date.now()}`)
            ]);
            const stats = await statsResp.json();
            currentState = await stateResp.json();

            const statsCards = document.getElementById('stats-cards');
            const cards = [
                createStatCard(stats.total, '总文件数', 'rounded-xl border border-blue-100 dark:border-blue-900 bg-blue-50/90 dark:bg-blue-950/70 p-4 text-blue-900 dark:text-blue-200'),
                createStatCard(stats.synced, '已同步', 'rounded-xl border border-emerald-100 dark:border-emerald-900 bg-emerald-50/90 dark:bg-emerald-950/70 p-4 text-emerald-900 dark:text-emerald-200'),
                createStatCard(stats.pending, '待同步', 'rounded-xl border border-amber-100 dark:border-amber-900 bg-amber-50/90 dark:bg-amber-950/70 p-4 text-amber-900 dark:text-amber-200'),
                createStatCard(stats.failed, '失败', 'rounded-xl border border-rose-100 dark:border-rose-900 bg-rose-50/90 dark:bg-rose-950/70 p-4 text-rose-900 dark:text-rose-200'),
                createStatCard(stats.baseline, '基线', 'rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-100/90 dark:bg-slate-800/90 p-4 text-slate-800 dark:text-slate-200'),
                createStatCard(stats.permanent_failed, '永久失败', 'rounded-xl border border-fuchsia-100 dark:border-fuchsia-900 bg-fuchsia-50/90 dark:bg-fuchsia-950/70 p-4 text-fuchsia-900 dark:text-fuchsia-200')
            ];
            statsCards.replaceChildren(...cards);

            renderFilesTable();
        }

        function renderFilesTable() {
            if (!currentState) return;

            let files = [];
            const tableContainer = document.getElementById('files-table');
            tableContainer.replaceChildren();

            const filterWrapper = createElement('div', { className: 'mb-4' });
            const folderSelect = createElement('select', {
                className: 'max-w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-700 dark:text-slate-300 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900'
            });
            folderSelect.add(new Option('所有文件夹', 'all', currentFolderFilter === 'all', currentFolderFilter === 'all'));
            folderSelect.addEventListener('change', (event) => {
                currentFolderFilter = event.target.value;
                currentPage = 1;
                renderFilesTable();
            });

            for (const [ruleId, ruleData] of Object.entries(currentState.rules || {})) {
                folderSelect.add(new Option(
                    ruleData.source_path || ruleId,
                    ruleId,
                    currentFolderFilter === ruleId,
                    currentFolderFilter === ruleId
                ));
                if (currentFolderFilter === 'all' || currentFolderFilter === ruleId) {
                    for (const [path, info] of Object.entries(ruleData.files || {})) {
                        files.push({ path, ...info });
                    }
                }
            }

            const totalPages = Math.max(1, Math.ceil(files.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const pageFiles = files.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

            filterWrapper.appendChild(folderSelect);

            const tableWrapper = createElement('div', {
                className: 'overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900'
            });
            const table = createElement('table', { className: 'min-w-full text-sm' });
            const thead = createElement('thead', {
                className: 'bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300'
            });
            const headRow = createElement('tr');
            ['文件路径', '状态', '重试次数', '最后错误'].forEach((title) => {
                headRow.appendChild(createElement('th', {
                    className: 'px-3 py-2 text-left font-semibold',
                    text: title
                }));
            });
            thead.appendChild(headRow);

            const tbody = createElement('tbody');
            pageFiles.forEach((file) => {
                const row = createElement('tr', {
                    className: 'border-b border-slate-100 dark:border-slate-800 last:border-none'
                });
                const pathCell = createElement('td', {
                    className: 'max-w-xs truncate px-3 py-2 text-slate-800 dark:text-slate-200',
                    text: file.path
                });
                const statusCell = createElement('td', { className: 'px-3 py-2' });
                const statusBadge = createElement('span', {
                    className: `inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ${getStatusColor(file.status)}`,
                    text: file.status || 'unknown'
                });
                statusCell.appendChild(statusBadge);
                const retryCell = createElement('td', {
                    className: 'px-3 py-2 text-slate-700 dark:text-slate-300',
                    text: String(file.retry_count || 0)
                });
                const errorCell = createElement('td', {
                    className: 'max-w-xs truncate px-3 py-2 text-slate-600 dark:text-slate-400',
                    text: file.last_error || '-'
                });
                row.append(pathCell, statusCell, retryCell, errorCell);
                tbody.appendChild(row);
            });

            table.append(thead, tbody);
            tableWrapper.appendChild(table);

            const pager = createElement('div', {
                className: 'mt-4 flex flex-wrap items-center gap-2'
            });
            const previousButton = createConfigButton(
                '上一页',
                'rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-slate-300 transition hover:bg-slate-100 dark:hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-40',
                () => changePage(-1)
            );
            previousButton.disabled = currentPage <= 1;

            const pageText = createElement('span', {
                className: 'text-sm text-slate-600 dark:text-slate-400',
                text: `第 ${currentPage} / ${totalPages} 页（共 ${files.length} 条）`
            });

            const nextButton = createConfigButton(
                '下一页',
                'rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-slate-300 transition hover:bg-slate-100 dark:hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-40',
                () => changePage(1)
            );
            nextButton.disabled = currentPage >= totalPages;

            pager.append(previousButton, pageText, nextButton);
            tableContainer.append(filterWrapper, tableWrapper, pager);
        }

        function changePage(delta) {
            currentPage += delta;
            renderFilesTable();
        }

        function getStatusColor(status) {
            const colors = {
                synced: 'bg-emerald-100 dark:bg-emerald-900/60 text-emerald-800 dark:text-emerald-200',
                pending: 'bg-amber-100 dark:bg-amber-900/60 text-amber-800 dark:text-amber-200',
                failed: 'bg-rose-100 dark:bg-rose-900/60 text-rose-800 dark:text-rose-200',
                baseline: 'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300',
                permanent_failed: 'bg-fuchsia-100 dark:bg-fuchsia-900/60 text-fuchsia-800 dark:text-fuchsia-200'
            };
            return colors[status] || 'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300';
        }

        function renderProgress(data) {
            const list = document.getElementById('progress-list');
            list.replaceChildren();
            if (data?.error) {
                list.appendChild(createElement('div', {
                    className: 'rounded-xl border border-red-200 bg-red-50 py-10 text-center text-sm font-medium text-red-700',
                    text: `加载实时进度失败: ${data.error}`
                }));
                return;
            }

            const entries = Object.entries(data || {}).filter(([, item]) => item && typeof item === 'object');
            if (entries.length === 0) {
                list.appendChild(createElement('div', {
                    className: 'rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-10 text-center text-sm font-medium text-slate-500 dark:text-slate-400',
                    text: '暂无下载任务'
                }));
                return;
            }

            entries.forEach(([, item]) => {
                const progress = item.progress || {};
                const sourceFile = item.transfer_info?.source_file || '';
                if (progress.connecting) {
                    const connectingCard = createElement('div', {
                        className: 'mb-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm'
                    });
                    const title = createElement('div', {
                        className: 'mb-2 truncate text-sm font-semibold text-slate-800 dark:text-slate-200',
                        text: progress.current_file || sourceFile
                    });
                    const barOuter = createElement('div', {
                        className: 'relative mb-1 h-4 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700'
                    });
                    barOuter.appendChild(createElement('div', {
                        className: 'h-4 w-full animate-pulse rounded-full bg-sky-300 dark:bg-sky-600'
                    }));
                    const status = createElement('div', {
                        className: 'text-sm font-medium text-amber-600 dark:text-amber-400',
                        text: '连接 rclone 中…'
                    });
                    connectingCard.append(title, barOuter, status);
                    list.appendChild(connectingCard);
                    return;
                }
                // Normalize percentage to avoid invalid width values (e.g. undefined/NaN/string)
                const percentageValue = Number(progress.percentage);
                const safePercentage = Number.isFinite(percentageValue)
                    ? Math.min(100, Math.max(0, percentageValue))
                    : 0;
                // Use at least 5% width so the bar is always visible once transfer starts
                const barWidth = safePercentage > 0 ? Math.max(safePercentage, 5) : 0;
                const percentageText = safePercentage.toFixed(2).replace(/\.?0+$/, '');
                const progressCard = createElement('div', {
                    className: 'mb-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm'
                });
                const title = createElement('div', {
                    className: 'mb-2 truncate text-sm font-semibold text-slate-800 dark:text-slate-200',
                    text: progress.current_file || sourceFile
                });
                const barOuter = createElement('div', {
                    className: 'relative mb-1 h-4 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700'
                });
                const barInner = createElement('div', {
                    className: 'h-4 rounded-full transition-all duration-300 ease-out'
                });
                barInner.style.width = `${barWidth}%`;
                barInner.style.backgroundColor = '#2d8cff';
                barOuter.appendChild(barInner);
                const meta = createElement('div', {
                    className: 'mb-1 text-sm text-slate-700 dark:text-slate-300',
                    text: `${percentageText}% | 速度: ${formatSpeedMBps(progress.speedMBps)} MB/s | 剩余: ${progress.eta != null ? Math.round(progress.eta) + 's' : '计算中'}`
                });
                const bytes = createElement('div', {
                    className: 'text-xs text-slate-500 dark:text-slate-400',
                    text: `${formatBytesInMB(progress.bytes, '0 MB')} / ${Number(progress.totalBytes) ? formatBytesInMB(progress.totalBytes, '未知') : '未知'}`
                });
                progressCard.append(title, barOuter, meta, bytes);
                list.appendChild(progressCard);
            });
        }

        socket.on('progress_update', renderProgress);

        async function loadProgress() {
            try {
                const resp = await apiFetch(`/api/progress?_t=${Date.now()}`);
                const data = await resp.json();
                renderProgress(data);
            } catch (err) {
                console.error('加载实时进度失败', err);
            }
        }

        async function loadLogs() {
            const resp = await apiFetch(`/api/logs?lines=200&_t=${Date.now()}`);
            const data = await resp.json();
            const logsContent = document.getElementById('logs-content');
            logsContent.textContent = data.error || (Array.isArray(data.logs) ? data.logs.join('') : '');
        }

        window.onload = () => {
            showTab('config');
            ensureAuth();
        };
    </script>
</body>

</html>
