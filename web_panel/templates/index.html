<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Daemon 管理面板</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind = {
            darkMode: 'class',
            config: {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                50: '#eff8ff',
                                100: '#dceefe',
                                500: '#2d8cff',
                                600: '#1f79e0',
                                700: '#1a65bd'
                            }
                        },
                        boxShadow: {
                            soft: '0 20px 60px -24px rgba(15, 23, 42, 0.35)'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 系统主题检测和应用
        function applyTheme() {
            if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        applyTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
    </script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background: radial-gradient(circle at 20% -10%, #d9eeff 0%, transparent 45%),
                radial-gradient(circle at 90% 0%, #e9f8f2 0%, transparent 40%),
                #f4f8fb;
        }

        .dark body {
            background: radial-gradient(circle at 20% -10%, #1e3a52 0%, transparent 45%),
                radial-gradient(circle at 90% 0%, #1a3d2e 0%, transparent 40%),
                #0f172a;
        }

        .panel-card {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            box-shadow: 0 20px 60px -24px rgba(15, 23, 42, 0.35);
        }

        .dark .panel-card {
            border: 1px solid #334155;
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 20px 60px -24px rgba(0, 0, 0, 0.6);
        }

        .tab-btn {
            border-bottom: 2px solid transparent;
            color: #64748b;
            transition: all 180ms ease;
        }

        .tab-btn:hover {
            color: #0f172a;
            background: #eef4fa;
        }

        .dark .tab-btn {
            color: #94a3b8;
        }

        .dark .tab-btn:hover {
            color: #f1f5f9;
            background: #334155;
        }

        .tab-btn.border-blue-500 {
            color: #0f172a;
            border-bottom-color: #2d8cff;
            background: #e9f3ff;
        }

        .dark .tab-btn.border-blue-500 {
            color: #f1f5f9;
            border-bottom-color: #3b82f6;
            background: #1e3a52;
        }
    </style>
</head>

<body class="min-h-screen text-slate-800 dark:bg-slate-950 dark:text-slate-100">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 lg:py-10">
        <section class="panel-card mb-6 overflow-hidden p-6 sm:p-8">
            <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
                <div>
                    <p class="text-sm font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">Sync Daemon</p>
                    <h1 class="mt-2 text-3xl font-extrabold tracking-tight text-slate-900 dark:text-slate-50 sm:text-4xl">管理面板</h1>
                    <p class="mt-3 max-w-2xl text-sm text-slate-600 dark:text-slate-300 sm:text-base">配置同步策略，实时查看传输状态，统一管理运行日志。</p>
                </div>
                <div class="rounded-2xl border border-sky-100 dark:border-sky-900 bg-sky-50/70 dark:bg-sky-950/50 px-4 py-3 text-sm text-sky-700 dark:text-sky-300">
                    前端已启用实时状态刷新
                </div>
            </div>
        </section>

        <section class="panel-card p-3 sm:p-4">
            <div class="mb-6 border-b border-slate-200 dark:border-slate-700 px-1">
                <nav class="flex flex-wrap gap-2 pb-2">
                    <button onclick="showTab('config')" id="tab-config"
                        class="tab-btn border-blue-500 rounded-lg px-4 py-2 text-sm font-semibold">配置管理</button>
                    <button onclick="showTab('status')" id="tab-status"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">状态监控</button>
                    <button onclick="showTab('progress')" id="tab-progress"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">实时进度</button>
                    <button onclick="showTab('logs')" id="tab-logs"
                        class="tab-btn rounded-lg px-4 py-2 text-sm font-semibold">日志查看</button>
                </nav>
            </div>

            <div id="content-config" class="tab-content px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">配置管理</h2>
                    <div id="config-form"></div>
                    <div class="mt-6 flex flex-col items-start gap-3">
                        <button id="config-save-btn" onclick="saveConfig()"
                            class="rounded-lg bg-blue-500 hover:bg-blue-600 dark:bg-blue-600 dark:hover:bg-blue-700 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition">
                            保存配置
                        </button>
                        <div id="config-message"></div>
                    </div>
                </div>
            </div>

            <div id="content-status" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">状态监控</h2>
                    <div id="stats-cards" class="mb-6 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
                    <div id="files-table"></div>
                </div>
            </div>

            <div id="content-progress" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <h2 class="mb-5 text-xl font-bold text-slate-900 dark:text-slate-50">实时进度</h2>
                    <div id="progress-list"></div>
                </div>
            </div>

            <div id="content-logs" class="tab-content hidden px-2 pb-2 sm:px-3 sm:pb-3">
                <div class="panel-card p-5 sm:p-6">
                    <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                        <h2 class="text-xl font-bold text-slate-900 dark:text-slate-50">日志查看</h2>
                        <button onclick="loadLogs()"
                            class="rounded-lg bg-emerald-500 dark:bg-emerald-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-emerald-600 dark:hover:bg-emerald-500">刷新日志</button>
                    </div>
                    <div id="logs-content"
                        class="h-96 overflow-y-auto rounded-xl border border-slate-800 dark:border-slate-700 bg-slate-900 dark:bg-slate-950 p-4 font-mono text-sm leading-6 text-emerald-300 dark:text-emerald-400"></div>
                </div>
            </div>
        </section>
    </div>
    <script>
        const socket = io({ autoConnect: false });
        let currentConfig = {};
        let progressPollTimer = null;

        async function apiFetch(url, options = {}) {
            const requestOptions = {
                ...options,
                headers: { ...(options.headers || {}) }
            };

            let resp = await fetch(url, requestOptions);
            if (resp.status === 401) {
                let input = prompt("需要 API Key 认证，请输入 (不会写入 localStorage):", "");
                if (input !== null) {
                    const apiKey = input.trim();
                    if (apiKey) {
                        requestOptions.headers['X-API-Key'] = apiKey;
                        await fetch('/api/auth', {
                            method: 'POST',
                            headers: { 'X-API-Key': apiKey }
                        });
                        if (!socket.connected) {
                            socket.connect();
                        }
                        resp = await fetch(url, requestOptions);
                    }
                }
            }
            return resp;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('border-blue-500'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('border-blue-500');

            // 离开实时进度 tab 时停止轮询
            if (progressPollTimer !== null) {
                clearInterval(progressPollTimer);
                progressPollTimer = null;
            }

            if (tab === 'config') {
                document.getElementById('config-message').innerHTML = '';
                loadConfig();
            }
            if (tab === 'status') loadStatus();
            if (tab === 'progress') {
                loadProgress();
                progressPollTimer = setInterval(loadProgress, 1000);
            }
            if (tab === 'logs') loadLogs();
        }

        async function loadConfig() {
            try {
                const resp = await apiFetch(`/api/config?_t=${Date.now()}`);
                currentConfig = await resp.json();
                if (currentConfig.error) {
                    document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">加载配置出错: ${currentConfig.error}</div>`;
                }
                renderConfigForm(currentConfig);
            } catch (err) {
                document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">请求配置失败: ${err}</div>`;
            }
        }

        function renderConfigForm(config) {
            const form = document.getElementById('config-form');
            form.innerHTML = `
                <div class="space-y-4">
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">扫描间隔（秒）</label>
                    <input type="number" id="scan_interval_seconds" value="${config.scan_interval_seconds}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">刷新间隔（秒）</label>
                    <input type="number" id="rclone_refresh_interval_seconds" value="${config.rclone_refresh_interval_seconds}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">最大并发下载数</label>
                    <input type="number" id="max_concurrent_downloads" value="${config.max_concurrent_downloads}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">最大重试次数</label>
                    <input type="number" id="max_retry_count" value="${config.max_retry_count}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">带宽限制（MB/s，0=无限制）</label>
                    <input type="number" id="bandwidth_limit_mbps" value="${config.bandwidth_limit_mbps}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">rclone 命令</label>
                    <input type="text" id="rclone_command" value="${config.rclone_command}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">rclone 服务名</label>
                    <input type="text" id="rclone_service_name" value="${config.rclone_service_name}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div><label class="mb-1 block text-sm font-semibold text-slate-700 dark:text-slate-300">同步脚本 service 名 <span class="text-xs font-medium text-slate-500 dark:text-slate-400">（保存后自动 systemctl restart，留空则跳过）</span></label>
                    <input type="text" id="sync_service_name" value="${config.sync_service_name || ''}" placeholder="例如：sync_daemon.service" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    <div>
                        <div class="flex items-center justify-between gap-3">
                            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">同步规则</label>
                            <button type="button" onclick="addRule()" class="rounded-lg bg-emerald-500 dark:bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-emerald-600 dark:hover:bg-emerald-500">添加规则</button>
                        </div>
                        <div id="rules-list" class="mt-3 space-y-3"></div>
                    </div>
                </div>
            `;
            renderRules(config.rules || []);
        }

        function renderRules(rules) {
            const list = document.getElementById('rules-list');
            list.innerHTML = rules.map((rule, i) => `
                <div class="rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50/70 dark:bg-slate-800/70 p-3">
                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                        <div><label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">源路径</label><input type="text" id="rule_${i}_source" value="${rule.source_path}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                        <div><label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">目标路径</label><input type="text" id="rule_${i}_dest" value="${rule.dest_path}" class="w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-2.5 py-1.5 text-sm text-slate-900 dark:text-slate-100 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900"></div>
                    </div>
                    <div class="mt-3 flex items-end justify-between">
                        <label class="inline-flex items-center text-sm font-medium text-slate-700 dark:text-slate-300"><input type="checkbox" id="rule_${i}_enabled" ${rule.enabled ? 'checked' : ''} class="mr-2 h-4 w-4 rounded border-slate-300 dark:border-slate-600 text-brand-600 focus:ring-brand-500">启用</label>
                        <button type="button" onclick="deleteRule(${i})" class="rounded-lg bg-rose-500 dark:bg-rose-600 px-3 py-1.5 text-xs font-semibold text-white transition hover:bg-rose-600 dark:hover:bg-rose-500">删除</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveConfig() {
            // Spread original config first to preserve any extra fields (e.g. _comment)
            const newConfig = {
                ...currentConfig,
                scan_interval_seconds: parseInt(document.getElementById('scan_interval_seconds').value),
                rclone_refresh_interval_seconds: parseInt(document.getElementById('rclone_refresh_interval_seconds').value),
                max_concurrent_downloads: parseInt(document.getElementById('max_concurrent_downloads').value),
                max_retry_count: parseInt(document.getElementById('max_retry_count').value),
                bandwidth_limit_mbps: parseFloat(document.getElementById('bandwidth_limit_mbps').value),
                rclone_command: document.getElementById('rclone_command').value,
                rclone_service_name: document.getElementById('rclone_service_name').value,
                sync_service_name: document.getElementById('sync_service_name').value,
                rules: (currentConfig.rules || []).map((rule, i) => ({
                    ...rule,
                    source_path: document.getElementById(`rule_${i}_source`).value,
                    dest_path: document.getElementById(`rule_${i}_dest`).value,
                    enabled: document.getElementById(`rule_${i}_enabled`).checked
                }))
            };

            const resp = await apiFetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newConfig)
            });
            const result = await resp.json();
            document.getElementById('config-message').innerHTML = result.error ?
                `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">${result.error}</div>` :
                `<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">${result.message}</div>`;
        }

        async function addRule() {
            const sourcePathInput = prompt('请输入 source_path（源路径）:');
            if (sourcePathInput === null) return;
            const sourcePath = sourcePathInput.trim();
            if (!sourcePath) {
                document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">source_path 不能为空</div>`;
                return;
            }

            const destPathInput = prompt('请输入 dest_path（目标路径）:');
            if (destPathInput === null) return;
            const destPath = destPathInput.trim();
            if (!destPath) {
                document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">dest_path 不能为空</div>`;
                return;
            }

            if (!Array.isArray(currentConfig.rules)) {
                currentConfig.rules = [];
            }

            // Preserve current form edits and append the new rule at the end.
            currentConfig.rules = (currentConfig.rules || []).map((rule, i) => ({
                ...rule,
                source_path: document.getElementById(`rule_${i}_source`)?.value ?? rule.source_path,
                dest_path: document.getElementById(`rule_${i}_dest`)?.value ?? rule.dest_path,
                enabled: document.getElementById(`rule_${i}_enabled`)?.checked ?? rule.enabled
            }));

            currentConfig.rules.push({
                source_path: sourcePath,
                dest_path: destPath,
                enabled: true,
                _comment: 'Set enabled=true after validating source and destination paths.'
            });

            renderRules(currentConfig.rules);
            document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">规则已添加到列表底部，请点击“保存配置”生效。</div>`;
        }

        async function deleteRule(ruleIndex) {
            const confirmed = confirm('确认删除这条规则吗？');
            if (!confirmed) return;

            const resp = await apiFetch(`/api/config/rules/${ruleIndex}`, {
                method: 'DELETE'
            });
            const result = await resp.json();
            if (result.error) {
                document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">${result.error}</div>`;
                return;
            }

            document.getElementById('config-message').innerHTML = `<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">${result.message}</div>`;
            await loadConfig();
        }

        let currentState = null;
        let currentFolderFilter = 'all';
        let currentPage = 1;
        const PAGE_SIZE = 30;

        async function loadStatus() {
            const [statsResp, stateResp] = await Promise.all([
                apiFetch(`/api/stats?_t=${Date.now()}`),
                apiFetch(`/api/state?_t=${Date.now()}`)
            ]);
            const stats = await statsResp.json();
            currentState = await stateResp.json();

            document.getElementById('stats-cards').innerHTML = `
                <div class="rounded-xl border border-blue-100 dark:border-blue-900 bg-blue-50/90 dark:bg-blue-950/70 p-4"><div class="text-2xl font-extrabold text-blue-900 dark:text-blue-200">${stats.total}</div><div class="mt-1 text-sm font-medium text-blue-800 dark:text-blue-300">总文件数</div></div>
                <div class="rounded-xl border border-emerald-100 dark:border-emerald-900 bg-emerald-50/90 dark:bg-emerald-950/70 p-4"><div class="text-2xl font-extrabold text-emerald-900 dark:text-emerald-200">${stats.synced}</div><div class="mt-1 text-sm font-medium text-emerald-800 dark:text-emerald-300">已同步</div></div>
                <div class="rounded-xl border border-amber-100 dark:border-amber-900 bg-amber-50/90 dark:bg-amber-950/70 p-4"><div class="text-2xl font-extrabold text-amber-900 dark:text-amber-200">${stats.pending}</div><div class="mt-1 text-sm font-medium text-amber-800 dark:text-amber-300">待同步</div></div>
                <div class="rounded-xl border border-rose-100 dark:border-rose-900 bg-rose-50/90 dark:bg-rose-950/70 p-4"><div class="text-2xl font-extrabold text-rose-900 dark:text-rose-200">${stats.failed}</div><div class="mt-1 text-sm font-medium text-rose-800 dark:text-rose-300">失败</div></div>
                <div class="rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-100/90 dark:bg-slate-800/90 p-4"><div class="text-2xl font-extrabold text-slate-800 dark:text-slate-200">${stats.baseline}</div><div class="mt-1 text-sm font-medium text-slate-700 dark:text-slate-300">基线</div></div>
                <div class="rounded-xl border border-fuchsia-100 dark:border-fuchsia-900 bg-fuchsia-50/90 dark:bg-fuchsia-950/70 p-4"><div class="text-2xl font-extrabold text-fuchsia-900 dark:text-fuchsia-200">${stats.permanent_failed}</div><div class="mt-1 text-sm font-medium text-fuchsia-800 dark:text-fuchsia-300">永久失败</div></div>
            `;

            renderFilesTable();
        }

        function renderFilesTable() {
            if (!currentState) return;

            let files = [];
            let folderOptionsHTML = `<option value="all" ${currentFolderFilter === 'all' ? 'selected' : ''}>所有文件夹</option>`;

            for (const [ruleId, ruleData] of Object.entries(currentState.rules || {})) {
                folderOptionsHTML += `<option value="${ruleId}" ${currentFolderFilter === ruleId ? 'selected' : ''}>${ruleData.source_path}</option>`;
                if (currentFolderFilter === 'all' || currentFolderFilter === ruleId) {
                    for (const [path, info] of Object.entries(ruleData.files || {})) {
                        files.push({ path, ...info });
                    }
                }
            }

            const totalPages = Math.max(1, Math.ceil(files.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const pageFiles = files.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

            const pagerHTML = `
                <div class="mt-4 flex flex-wrap items-center gap-2">
                    <button onclick="changePage(-1)" class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-slate-300 transition hover:bg-slate-100 dark:hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-40" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>
                    <span class="text-sm text-slate-600 dark:text-slate-400">第 ${currentPage} / ${totalPages} 页（共 ${files.length} 条）</span>
                    <button onclick="changePage(1)" class="rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-1.5 text-sm text-slate-700 dark:text-slate-300 transition hover:bg-slate-100 dark:hover:bg-slate-700 disabled:cursor-not-allowed disabled:opacity-40" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>
                </div>
            `;

            document.getElementById('files-table').innerHTML = `
                <div class="mb-4">
                    <select onchange="currentFolderFilter=this.value; currentPage=1; renderFilesTable()" class="max-w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 px-3 py-2 text-sm text-slate-700 dark:text-slate-300 outline-none transition focus:border-brand-500 focus:ring-2 focus:ring-brand-100 dark:focus:ring-brand-900">
                        ${folderOptionsHTML}
                    </select>
                </div>
                <div class="overflow-x-auto rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900"><table class="min-w-full text-sm">
                    <thead class="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300"><tr>
                        <th class="px-3 py-2 text-left font-semibold">文件路径</th>
                        <th class="px-3 py-2 text-left font-semibold">状态</th>
                        <th class="px-3 py-2 text-left font-semibold">重试次数</th>
                        <th class="px-3 py-2 text-left font-semibold">最后错误</th>
                    </tr></thead>
                    <tbody>${pageFiles.map(f => `
                        <tr class="border-b border-slate-100 dark:border-slate-800 last:border-none">
                            <td class="max-w-xs truncate px-3 py-2 text-slate-800 dark:text-slate-200">${f.path}</td>
                            <td class="px-3 py-2"><span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ${getStatusColor(f.status)}">${f.status}</span></td>
                            <td class="px-3 py-2 text-slate-700 dark:text-slate-300">${f.retry_count || 0}</td>
                            <td class="max-w-xs truncate px-3 py-2 text-slate-600 dark:text-slate-400">${f.last_error || '-'}</td>
                        </tr>
                    `).join('')}</tbody>
                </table></div>
                ${pagerHTML}
            `;
        }

        function changePage(delta) {
            currentPage += delta;
            renderFilesTable();
        }

        function getStatusColor(status) {
            const colors = {
                synced: 'bg-emerald-100 dark:bg-emerald-900/60 text-emerald-800 dark:text-emerald-200',
                pending: 'bg-amber-100 dark:bg-amber-900/60 text-amber-800 dark:text-amber-200',
                failed: 'bg-rose-100 dark:bg-rose-900/60 text-rose-800 dark:text-rose-200',
                baseline: 'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300',
                permanent_failed: 'bg-fuchsia-100 dark:bg-fuchsia-900/60 text-fuchsia-800 dark:text-fuchsia-200'
            };
            return colors[status] || 'bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300';
        }

        function renderProgress(data) {
            const list = document.getElementById('progress-list');
            if (Object.keys(data).length === 0) {
                list.innerHTML = '<div class="rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 py-10 text-center text-sm font-medium text-slate-500 dark:text-slate-400">暂无下载任务</div>';
                return;
            }

            list.innerHTML = Object.entries(data).map(([key, item]) => {
                const progress = item.progress;
                if (progress.connecting) {
                    return `
                        <div class="mb-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm">
                            <div class="mb-2 truncate text-sm font-semibold text-slate-800 dark:text-slate-200">${progress.current_file || item.transfer_info.source_file}</div>
                            <div class="relative mb-1 h-4 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                                <div class="h-4 w-full animate-pulse rounded-full bg-sky-300 dark:bg-sky-600"></div>
                            </div>
                            <div class="text-sm font-medium text-amber-600 dark:text-amber-400">连接 rclone 中…</div>
                        </div>
                    `;
                }
                // Normalize percentage to avoid invalid width values (e.g. undefined/NaN/string)
                const percentageValue = Number(progress.percentage);
                const safePercentage = Number.isFinite(percentageValue)
                    ? Math.min(100, Math.max(0, percentageValue))
                    : 0;
                // Use at least 5% width so the bar is always visible once transfer starts
                const barWidth = safePercentage > 0 ? Math.max(safePercentage, 5) : 0;
                const percentageText = safePercentage.toFixed(2).replace(/\.?0+$/, '');
                return `
                    <div class="mb-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 p-4 shadow-sm">
                        <div class="mb-2 truncate text-sm font-semibold text-slate-800 dark:text-slate-200">${progress.current_file || item.transfer_info.source_file}</div>
                        <div class="relative mb-1 h-4 w-full overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700">
                            <div class="h-4 rounded-full transition-all duration-300 ease-out" style="width: ${barWidth}%; background-color: #2d8cff;"></div>
                        </div>
                        <div class="mb-1 text-sm text-slate-700 dark:text-slate-300">${percentageText}% &nbsp;|&nbsp; 速度: ${progress.speedMBps} MB/s &nbsp;|&nbsp; 剩余: ${progress.eta != null ? Math.round(progress.eta) + 's' : '计算中'}</div>
                        <div class="text-xs text-slate-500 dark:text-slate-400">${progress.bytes ? (progress.bytes / 1024 / 1024).toFixed(1) + ' MB' : '0 MB'} / ${progress.totalBytes ? (progress.totalBytes / 1024 / 1024).toFixed(1) + ' MB' : '未知'}</div>
                    </div>
                `;
            }).join('');
        }

        socket.on('progress_update', renderProgress);

        async function loadProgress() {
            try {
                const resp = await apiFetch(`/api/progress?_t=${Date.now()}`);
                const data = await resp.json();
                renderProgress(data);
            } catch (err) {
                console.error('加载实时进度失败', err);
            }
        }

        async function loadLogs() {
            const resp = await apiFetch(`/api/logs?lines=200&_t=${Date.now()}`);
            const data = await resp.json();
            document.getElementById('logs-content').innerHTML = data.logs.join('');
        }

        async function ensureAuthThenConnect() {
            try {
                const resp = await fetch('/api/auth', { method: 'POST' });
                if (resp.ok) {
                    socket.connect();
                    return;
                }
            } catch (err) {
                console.error('认证检查失败', err);
            }

            let input = prompt("需要 API Key 认证，请输入 (不会写入 localStorage):", "");
            if (input !== null) {
                const apiKey = input.trim();
                if (apiKey) {
                    try {
                        const authResp = await fetch('/api/auth', {
                            method: 'POST',
                            headers: { 'X-API-Key': apiKey }
                        });
                        if (authResp.ok) {
                            socket.connect();
                        }
                    } catch (err) {
                        console.error('认证失败', err);
                    }
                }
            }
        }

        window.onload = () => {
            showTab('config');
            ensureAuthThenConnect();
        };
    </script>
</body>

</html>
